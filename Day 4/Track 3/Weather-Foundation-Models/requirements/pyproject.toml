# uv-only configuration for the Weather Foundation Models track.
# Packages still live in requirements.txt; this file only declares extra
# build-time dependencies for packages whose setup.py imports things that
# aren't declared in their build-system.requires.

[tool.uv.extra-build-dependencies]
# flash-attn's setup.py imports torch and uses its version to construct a
# precompiled wheel URL. Pin torch to a version flash-attn 2.7.4.post1
# ships wheels for (2.2–2.7); otherwise it falls back to a source build
# that needs the CUDA toolkit (not present on SageMaker JupyterLab).
flash-attn = ["torch>=2.6,<2.8", "packaging", "wheel", "setuptools", "ninja"]
# nvidia-pyindex's setup.py imports pip directly.
nvidia-pyindex = ["pip", "setuptools", "wheel"]